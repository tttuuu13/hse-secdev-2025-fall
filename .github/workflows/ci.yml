name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install -r requirements-dev.txt || true
          pip install ruff black isort pytest pre-commit pip-audit
      - name: Lint & format
        run: |
          ruff check --output-format=github .
          black --check .
          isort --check-only .
      - name: Tests
        run: pytest -q
      - name: Scan dependencies for vulnerabilities
        run: pip-audit -r requirements.txt
      - name: Pre-commit (all files)
        run: pre-commit run --all-files --show-diff-on-failure

  container_security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Hadolint
        run: |
          sudo wget -O /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          sudo chmod +x /usr/local/bin/hadolint

      - name: Run Hadolint
        run: hadolint Dockerfile

      - name: Build Docker Image
        run: docker build -t app-image .
